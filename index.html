const fmt = (s)=>{ s=Math.max(0,Math.round(s)); const m=Math.floor(s/60), x=s%60;
  return String(m).padStart(2,"0")+":"+String(x).padStart(2,"0"); };

const loadLS = ()=>{ try { return JSON.parse(localStorage.getItem(LS_KEY)); } catch(e){ return null; } };
const saveLS = (o)=>{ try { localStorage.setItem(LS_KEY, JSON.stringify(o)); } catch(e){} };

function snapshot(status){
  return { status, meta, answers, times, startT, savedAt: Date.now() };
}

function buildPayload(complet, motif){
  const mk=()=>({ok:0,n:0});
  const g=mk(), byD=DOMAINES.map(()=>mk());
  const detail = Q.map(q=>{
    const v=answers[q.id], ok=v===q.a;
    g.n++; byD[q.d].n++;
    if(ok){ g.ok++; byD[q.d].ok++; }
    return { n:q.id+1, d:q.d+1, type:q.type, rep:v===undefined?"":(q.type==="VF"?q.opts[v]:LET[v]), ok:ok?1:0, t:+((times[q.id]||0).toFixed(1)) };
  });
  return {
    horodatage: new Date().toISOString(),
    nom: meta.nom, ecole: meta.ecole, iepp: meta.iepp, drena: meta.drena,
    score_global: g.ok, total: g.n,
    d1: byD[0].ok, d2: byD[1].ok, d3: byD[2].ok, d4: byD[3].ok,
    repondues: Object.keys(answers).length,
    duree_s: startT ? Math.min(LIMIT_S, Math.round((Date.now()-startT)/1000)) : 0,
    complet: complet ? "OUI" : "NON",
    motif: motif,
    detail: detail
  };
}

function sendPayload(payload, useBeacon){
  if(!HAS_ENDPOINT){ const st=loadLS()||{}; st.pending=payload; saveLS(st); return Promise.resolve(false); }
  const body = JSON.stringify(payload);
  if(useBeacon && navigator.sendBeacon){
    const sent = navigator.sendBeacon(ENDPOINT, new Blob([body], {type:"text/plain"}));
    if(!sent){ const st=loadLS()||{}; st.pending=payload; saveLS(st); }
    return Promise.resolve(sent);
  }
  return fetch(ENDPOINT, { method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain"}, body })
    .then(()=>{ const st=loadLS()||{}; delete st.pending; saveLS(st); return true; })
    .catch(()=>{ const st=loadLS()||{}; st.pending=payload; saveLS(st); return false; });
}

function flushPending(){
  const st=loadLS();
  if(st && st.pending && HAS_ENDPOINT && navigator.onLine){
    const p=st.pending;
    fetch(ENDPOINT,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(p)})
      .then(()=>{ const s=loadLS()||{}; delete s.pending; saveLS(s); const n=$("#pendingNote"); if(n) n.textContent="✓ Données transmises."; })
      .catch(()=>{});
  }
}

/* ---------- Sortie en cours de test = test clôturé ---------- */
function onLeave(){
  if(phase!=="quiz" || finishing) return;
  finishing = true;
  const payload = buildPayload(false, "sortie_avant_fin");
  saveLS({ status:"done", result:{ ok:payload.score_global, n:payload.total, byD:[payload.d1,payload.d2,payload.d3,payload.d4], complet:false } });
  sendPayload(payload, true);
}
window.addEventListener("pagehide", onLeave);
window.addEventListener("beforeunload", onLeave);

/* ---------- Écrans ---------- */
function render(){ 
  if(phase==="setup") renderSetup();
  else if(phase==="quiz") renderQuiz();
  else if(phase==="results") renderResults();
  window.scrollTo(0,0);
}

function header(sub){
  return `<header style="padding:32px 0 22px;text-align:center">
    <div class="mono" style="font-size:11px;letter-spacing:2px;color:var(--grey);text-transform:uppercase">
      République de Côte d'Ivoire — MENA-ET</div>
    <h1 class="display" style="font-size:25px;margin-top:10px;line-height:1.2">RÉFÉRENTIEL DES COMPÉTENCES<br>DE L'IEPP COCODY II PLATEAUX</h1>
    <p style="margin-top:10px;color:#4B5563;font-size:14.5px">${sub}</p>
  </header>`;
}

function renderSetup(){
  $("#app").innerHTML = tri + `<div class="wrap">
    ${header(`Test de maîtrise du référentiel des compétences du Directeur d'école primaire<br>${TOTAL} questions · ${PER} par domaine · <b>durée limitée : 15 minutes</b>`)}
    ${HAS_ENDPOINT?"":'<div class="card" style="border-left:4px solid var(--bad);margin-bottom:14px;font-size:13px;color:var(--bad)"><b>⚠ Note administrateur :</b> l\'URL de collecte Google Apps Script n\'est pas encore configurée (ligne ENDPOINT du fichier). Les réponses ne seront pas transmises.</div>'}
    <div class="card" style="margin-bottom:16px">
      <h2 style="font-size:16px;color:var(--navy);margin-bottom:14px">Identification du directeur</h2>
      <div style="display:grid;gap:12px">
        ${[["nom","Nom et prénoms *"],["ecole","École *"]].map(([k,l])=>`
        <label style="font-size:13px;font-weight:700;color:#374151">${l}
          <input class="field" style="margin-top:5px" id="f_${k}" value="${esc(meta[k])}"></label>`).join("")}
      </div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <h2 style="font-size:16px;color:var(--navy);margin-bottom:10px">Consignes — à lire avant de démarrer</h2>
      <p style="font-size:14px;color:#374151;line-height:1.7">
      1. Une seule réponse par question (1 point). Le chronomètre décompte <b>15 minutes</b> : à zéro, le test se termine et s'envoie automatiquement.<br>
      2. <b>Une seule participation est autorisée.</b> Si vous quittez ou fermez la page en cours de test, celui-ci est définitivement clôturé et les réponses déjà saisies sont transmises.<br>
      3. À la fin, vos résultats sont transmis automatiquement à l'administration. Assurez-vous d'être connecté à internet.</p>
    </div>
    <button class="btn btn-p" style="width:100%;font-size:16px" id="startBtn" disabled>Renseignez les champs obligatoires (*)</button>
  </div>`;
  const check=()=>{ ["nom","ecole"].forEach(k=>meta[k]=$("#f_"+k).value);
    const ok=meta.nom.trim()&&meta.ecole.trim();
    $("#startBtn").disabled=!ok; $("#startBtn").textContent = ok?"Démarrer le test (15:00) ▸":"Renseignez les champs obligatoires (*)"; };
  ["nom","ecole"].forEach(k=>$("#f_"+k).addEventListener("input",check)); check();
  $("#startBtn").addEventListener("click",()=>{
    startT=Date.now(); lastT=Date.now(); phase="quiz";
    saveLS(snapshot("in_progress"));
    timerInt=setInterval(tick, 500);
    render();
  });
}

function tick(){
  const rem = LIMIT_S - (Date.now()-startT)/1000;
  const el=$("#chrono");
  if(el){ el.textContent="⏳ "+fmt(rem); el.style.background = rem<=120 ? "var(--bad)" : "rgba(255,255,255,.14)"; }
  if(rem<=0) finish(true);
}

function renderQuiz(){
  const q=Q[idx], sel=answers[q.id], answered=Object.keys(answers).length, isLast=idx===TOTAL-1;
  $("#app").innerHTML = `<div class="sticky">${tri}
    <div style="max-width:760px;margin:0 auto;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;color:#fff">
      <div style="font-size:12.5px;font-weight:700;opacity:.92">Question ${idx+1}/${TOTAL} · D${q.d+1}</div>
      <div class="mono" id="chrono" style="background:rgba(255,255,255,.14);border-radius:6px;padding:4px 12px;font-size:15px;font-weight:700">⏳ ${fmt(LIMIT_S-(Date.now()-startT)/1000)}</div>
    </div>
    <div class="bar"><div style="width:${100*answered/TOTAL}%"></div></div>
  </div>
  <div class="wrap" style="padding-top:22px">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <span class="badge" style="background:${TCOL[q.type]}">${TLAB[q.type]}</span>
      <span class="mono" style="font-size:11px;letter-spacing:1px;color:#8A8474;text-transform:uppercase">${esc(DOMAINES[q.d])}</span>
    </div>
    <h2 style="font-size:17.5px;font-weight:800;line-height:1.45;margin-bottom:18px">
      <span class="mono" style="color:#8A8474;font-size:14px;margin-right:8px">${String(idx+1).padStart(2,"0")}.</span>${esc(q.q)}</h2>
    <div style="display:grid;gap:10px">
      ${q.opts.map((o,i)=>`<button class="opt${sel===i?" sel":""}" data-i="${i}">
        <span class="optL">${q.type==="VF"?(i===0?"V":"F"):LET[i]}.</span><span>${esc(o)}</span></button>`).join("")}
    </div>
    <div style="display:flex;gap:10px;margin-top:24px">
      <button class="btn btn-p" style="flex:1" id="next" ${sel===undefined?"disabled":""}>
        ${sel===undefined?"Sélectionnez une réponse":isLast?`Terminer et transmettre (${answered}/${TOTAL}) ✓`:"Question suivante ▸"}</button>
    </div>
    <p style="font-size:12px;color:var(--grey);margin-top:12px;text-align:center">Participation unique — ne fermez pas cette page avant la fin.</p>
  </div>`;
  document.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>{
    const i=+b.dataset.i;
    if(!(q.id in times)) times[q.id]=(Date.now()-lastT)/1000;
    lastT=Date.now(); answers[q.id]=i;
    saveLS(snapshot("in_progress"));
    render();
  }));
  $("#next").addEventListener("click",()=>{
    if(answers[q.id]===undefined) return;
    if(isLast) finish(false);
    else { idx++; lastT=Date.now(); render(); }
  });
}

function finish(auto){
  if(finishing) return;
  finishing = true;
  clearInterval(timerInt);
  const payload = buildPayload(Object.keys(answers).length===TOTAL, auto?"temps_ecoule":"termine");
  saveLS({ status:"done", result:{ ok:payload.score_global, n:payload.total, byD:[payload.d1,payload.d2,payload.d3,payload.d4], complet:payload.complet==="OUI" } });
  sendPayload(payload, false).then((sent)=>{ phase="results"; window.__sent=sent; render(); });
  phase="results"; render();
}

function renderResults(){
  const st=loadLS(), r=st&&st.result?st.result:null;
  const pending = st && st.pending;
  const gP = r ? 100*r.ok/r.n : 0, gB = band(gP);
  $("#app").innerHTML = tri + `<div class="wrap" style="padding-top:30px">
    ${header("Test terminé — merci de votre participation")}
    <div class="card" style="text-align:center;margin-bottom:16px;border-top:5px solid ${gB.hex}">
      <div class="display" style="font-size:48px;font-weight:900;color:${gB.hex};line-height:1">${r?r.ok:"—"}/${r?r.n:TOTAL}</div>
      <div style="font-weight:800;font-size:16px;color:${gB.hex};margin-top:4px">${r?gP.toFixed(1)+" % — "+gB.t:""}</div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <h2 style="font-size:15px;color:var(--navy);margin-bottom:12px">Scores par domaine</h2>
      <div style="display:grid;gap:10px">
      ${r?r.byD.map((ok,i)=>{ const p=100*ok/PER, b=band(p); return `
        <div>
          <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700">
            <span>D${i+1} — ${esc(DOMAINES[i])}</span><span class="mono" style="color:${b.hex}">${ok}/${PER}</span></div>
          <div class="pbar" style="margin-top:5px"><div style="width:${p}%;background:${b.hex}"></div></div>
        </div>`;}).join(""):""}
      </div>
    </div>
    <div class="card" style="border-left:4px solid ${pending?"var(--warn)":"var(--ok)"};font-size:13.5px;line-height:1.6">
      <b id="pendingNote">${pending
        ? "⏳ Transmission en attente : connectez cet appareil à internet puis rouvrez cette page pour finaliser l'envoi."
        : "✓ Vos résultats ont été transmis automatiquement à l'administration de l'IEPP."}</b>
      <div style="color:var(--grey);margin-top:6px">Ce test ne peut être passé qu'une seule fois sur cet appareil.</div>
    </div>
  </div>`;
  flushPending();
}

function renderDone(){
  phase="results";
  renderResults();
}

/* ---------- Démarrage : application du verrou ---------- */
(function init(){
  const st = loadLS();
  if(st && st.status === "done"){ renderDone(); return; }
  if(st && st.status === "in_progress"){
    /* Test commencé puis page fermée : clôture définitive avec les réponses sauvegardées */
    meta = st.meta || meta; answers = st.answers || {}; times = st.times || {}; startT = st.startT || Date.now();
    const payload = buildPayload(false, "sortie_avant_fin");
    saveLS({ status:"done", result:{ ok:payload.score_global, n:payload.total, byD:[payload.d1,payload.d2,payload.d3,payload.d4], complet:false } });
    sendPayload(payload, false).then(()=>renderDone());
    renderDone(); return;
  }
  render();
})();
</script>
</body>
</html>
